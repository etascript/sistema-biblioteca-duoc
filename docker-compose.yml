services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: biblioteca-db
    environment:
      - ORACLE_PASSWORD=Admin123Password
      - APP_USER=biblioteca
      - APP_USER_PASSWORD=Biblioteca123
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./database/db.sql:/container-entrypoint-initdb.d/db.sql
      - ./database/init.sh:/container-entrypoint-initdb.d/init.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  bff-service:
    build:
      context: ./bff-service
      dockerfile: Dockerfile
    container_name: biblioteca-bff
    ports:
      - "8080:8080"
    environment:
      - URL_FUNCION_USUARIOS=https://biblio-users-g11.azurewebsites.net/api/usuarios
      - URL_FUNCION_PRESTAMOS=https://biblio-prestamos-g11.azurewebsites.net/api/prestamos
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: unless-stopped

  graphql-consultas:
    build:
      context: ./function-graphql-consultas
      dockerfile: Dockerfile
    container_name: biblioteca-graphql-consultas
    ports:
      - "8081:80"
    environment:
      - AzureWebJobsStorage=UseDevelopmentStorage=false
      - FUNCTIONS_WORKER_RUNTIME=java
      - ORACLE_DB_URL=jdbc:oracle:thin:@44.233.50.94:1521/XEPDB1
      - ORACLE_DB_USER=biblioteca
      - ORACLE_DB_PASSWORD=Biblioteca123
    restart: unless-stopped

  graphql-operaciones:
    build:
      context: ./function-graphql-operaciones
      dockerfile: Dockerfile
    container_name: biblioteca-graphql-operaciones
    ports:
      - "8082:80"
    environment:
      - AzureWebJobsStorage=UseDevelopmentStorage=false
      - FUNCTIONS_WORKER_RUNTIME=java
      - ORACLE_DB_URL=jdbc:oracle:thin:@44.233.50.94:1521/XEPDB1
      - ORACLE_DB_USER=biblioteca
      - ORACLE_DB_PASSWORD=Biblioteca123
    restart: unless-stopped

volumes:
  oracle-data:
