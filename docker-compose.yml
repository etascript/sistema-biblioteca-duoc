version: '3.8'

services:
  oracle-db:
    image: gvenzl/oracle-free:latest
    container_name: biblioteca-db
    environment:
      - ORACLE_PASSWORD=Admin123Password
    ports:
      - "1521:1521"
    volumes:
      - ./database/db.sql:/docker-entrypoint-initdb.d/db.sql

  function-usuarios:
    build: 
      context: ./function-usuarios
      dockerfile: Dockerfile
    container_name: fn-usuarios
    ports:
      - "8081:80" # El contenedor expone el 80, tu PC usa el 8081

  function-prestamos:
    build: 
      context: ./function-prestamos
      dockerfile: Dockerfile
    container_name: fn-prestamos
    ports:
      - "8082:80"

  bff-service:
    build: 
      context: ./bff-service
      dockerfile: Dockerfile
    container_name: biblioteca-bff
    ports:
      - "8080:8080"
    environment:
      # ¡OJO AQUÍ! Como están en la misma red de Docker, 
      # el BFF llama a las funciones por su nombre de contenedor
      - URL_FUNCION_USUARIOS=http://function-usuarios:80
      - URL_FUNCION_PRESTAMOS=http://function-prestamos:80
    depends_on:
      - function-usuarios
      - function-prestamos