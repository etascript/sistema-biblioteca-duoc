services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: biblioteca-db
    environment:
      - ORACLE_PASSWORD=Admin123Password
      - APP_USER=biblioteca
      - APP_USER_PASSWORD=Biblioteca123
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./database/db.sql:/container-entrypoint-initdb.d/db.sql
      - ./database/init.sh:/container-entrypoint-initdb.d/init.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  bff-service:
    build:
      context: ./bff-service
      dockerfile: Dockerfile
    container_name: biblioteca-bff
    ports:
      - "8080:8080"
    environment:
      - URL_FUNCION_USUARIOS=https://biblio-users-g11.azurewebsites.net/api/usuarios
      - URL_FUNCION_PRESTAMOS=https://biblio-prestamos-g11.azurewebsites.net/api/prestamos
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: unless-stopped

  graphql-consultas:
    build:
      context: ./function-graphql-consultas
      dockerfile: Dockerfile
    container_name: biblioteca-graphql-consultas
    ports:
      - "8081:80"
    environment:
      - AzureWebJobsStorage=UseDevelopmentStorage=false
      - FUNCTIONS_WORKER_RUNTIME=java
      - ORACLE_DB_URL=jdbc:oracle:thin:@44.226.152.17:1521/XEPDB1
      - ORACLE_DB_USER=biblioteca
      - ORACLE_DB_PASSWORD=Biblioteca123
    restart: unless-stopped

  graphql-operaciones:
    build:
      context: ./function-graphql-operaciones
      dockerfile: Dockerfile
    container_name: biblioteca-graphql-operaciones
    ports:
      - "8082:80"
    environment:
      - AzureWebJobsStorage=UseDevelopmentStorage=false
      - FUNCTIONS_WORKER_RUNTIME=java
      - ORACLE_DB_URL=jdbc:oracle:thin:@44.226.152.17:1521/XEPDB1
      - ORACLE_DB_USER=biblioteca
      - ORACLE_DB_PASSWORD=Biblioteca123
    restart: unless-stopped

  # Publicador de eventos a Azure Event Grid (HTTP Trigger -> Event Grid Custom Topic)
  # Requiere EVENT_GRID_TOPIC_ENDPOINT y EVENT_GRID_TOPIC_KEY configurados en Azure
  eventgrid-publicador:
    build:
      context: ./function-eventgrid-publicador
      dockerfile: Dockerfile
    container_name: biblioteca-eg-publicador
    ports:
      - "8083:80"
    environment:
      - AzureWebJobsStorage=UseDevelopmentStorage=false
      - FUNCTIONS_WORKER_RUNTIME=java
      - EVENT_GRID_TOPIC_ENDPOINT=${EVENT_GRID_TOPIC_ENDPOINT}
      - EVENT_GRID_TOPIC_KEY=${EVENT_GRID_TOPIC_KEY}
    restart: unless-stopped

  # Suscriptor de eventos de Azure Event Grid (EventGrid Trigger -> Oracle DB)
  # El trigger EventGrid requiere AzureWebJobsStorage con una cuenta de Azure Storage real.
  # En producción, Azure Event Grid envía eventos al endpoint del runtime:
  #   POST https://<functionApp>/runtime/webhooks/EventGrid?functionName=procesarEventoBiblioteca
  # El endpoint GET /api/eventos/log permite verificar los eventos procesados.
  eventgrid-suscriptor:
    build:
      context: ./function-eventgrid-suscriptor
      dockerfile: Dockerfile
    container_name: biblioteca-eg-suscriptor
    ports:
      - "8084:80"
    environment:
      - AzureWebJobsStorage=${AZURE_STORAGE_CONNECTION_STRING}
      - FUNCTIONS_WORKER_RUNTIME=java
      - ORACLE_DB_URL=jdbc:oracle:thin:@44.226.152.17:1521/XEPDB1
      - ORACLE_DB_USER=biblioteca
      - ORACLE_DB_PASSWORD=Biblioteca123
    restart: unless-stopped

volumes:
  oracle-data:
