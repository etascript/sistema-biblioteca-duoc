version: '3.8'

services:
  # 1. Base de Datos Oracle
  oracle-db:
    image: gvenzl/oracle-free:latest # Imagen ligera y optimizada de Oracle 23c
    container_name: biblioteca-db
    environment:
      - ORACLE_PASSWORD=Admin123Password # Cambia esto por algo seguro
      - APP_USER=biblioteca_user
      - APP_PASSWORD=biblioteca_pass
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
      # Este volumen ejecuta el script init.sql automáticamente al arrancar por primera vez
      - ./database/init.sql:/container-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  # 2. Tu Microservicio BFF
  bff-service:
    build: 
      context: ./bff-service
      dockerfile: Dockerfile
    container_name: biblioteca-bff
    ports:
      - "8080:8080"
    environment:
      # Aquí defines las URLs de tus funciones Serverless. 
      # Cuando subas a Docker Lab, solo cambias estas URLs.
      - URL_FUNCION_USUARIOS=http://tu-funcion-usuarios-url
      - URL_FUNCION_PRESTAMOS=http://tu-funcion-prestamos-url
    restart: unless-stopped

volumes:
  oracle_data: